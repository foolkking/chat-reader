name: chat-reader

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_reader}
      POSTGRES_USER: ${POSTGRES_USER:-chat_reader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  migrate:
    build:
      context: ./apps/api
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment: &api-environment
      APP_NAME: ${APP_NAME:-chat-reader}
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-chat_reader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chat_reader}
      CORS_ORIGINS: ${PUBLIC_WEB_BASE_URL:?PUBLIC_WEB_BASE_URL must be set}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL}
      MAX_IMPORT_FILE_SIZE_MB: ${MAX_IMPORT_FILE_SIZE_MB:-50}
      IMPORT_STORAGE_DIR: /data/imports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment: *api-environment
    volumes:
      - import-storage:/data/imports
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "${WEB_BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  import-storage:
