openapi: 3.1.0
info:
  title: chat-reader API
  version: 0.1.0
paths:
  /api/imports/preview:
    post:
      summary: Preview uploaded source files before import
      responses:
        '200': { description: Import preview }
  /api/imports/{import_id}/commit:
    post:
      summary: Commit a previewed import into canonical conversation storage
      parameters:
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Import committed }
  /api/imports/{import_id}/source-artifacts:
    get:
      summary: List raw source artifacts for an import
      parameters:
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Source artifact list }
  /api/imports/{import_id}/warnings:
    get:
      summary: List import warnings
      parameters:
        - name: import_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Import warnings }
  /api/conversations:
    get:
      summary: List conversations
      responses:
        '200': { description: Conversation list }
  /api/conversations/{conversation_id}:
    get:
      summary: Get conversation detail
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Conversation detail }
  /api/conversations/{conversation_id}/pin:
    patch:
      summary: Set or clear global conversation pin
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Updated conversation pin state }
  /api/conversations/{conversation_id}/messages:
    get:
      summary: Get paginated messages
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 30 }
        - name: include_blocks
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200': { description: Message page }
  /api/conversations/{conversation_id}/message-window:
    get:
      summary: Get a windowed page of messages
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: include_blocks
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200': { description: Message window }
  /api/conversations/{conversation_id}/toc:
    get:
      summary: Get generated table of contents for a conversation
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Conversation TOC }
  /api/messages/{message_id}:
    get:
      summary: Get message detail
      parameters:
        - name: message_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Message detail }
  /api/messages/{message_id}/blocks:
    get:
      summary: Get render blocks for a message
      parameters:
        - name: message_id
          in: path
          required: true
          schema: { type: string }
        - name: start
          in: query
          schema: { type: integer, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200': { description: Render blocks }
  /api/projects:
    get:
      summary: List projects and ensure default Inbox
      responses:
        '200': { description: Project list }
    post:
      summary: Create project
      responses:
        '201': { description: Project created }
  /api/projects/{project_id}:
    patch:
      summary: Update project metadata or archive state
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Project updated }
  /api/projects/{project_id}/conversations:
    get:
      summary: List conversations in a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Project conversation list }
  /api/projects/{project_id}/conversations/{conversation_id}:
    post:
      summary: Add conversation to project
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Project conversation relation }
    delete:
      summary: Remove conversation from project
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Removed }
  /api/projects/{project_id}/conversations/{conversation_id}/pin:
    patch:
      summary: Set or clear project-local conversation pin
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
        - name: conversation_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Project conversation pin state }
  /api/conversations/{conversation_id}/reading-position:
    get:
      summary: Get reading position for a conversation
      responses:
        '200': { description: Reading position or null position }
    put:
      summary: Upsert reading position for a conversation
      responses:
        '200': { description: Reading position saved }
  /api/conversations/{conversation_id}/recent:
    post:
      summary: Record recent conversation open
      responses:
        '200': { description: Recent item }
  /api/recent-items:
    get:
      summary: List recent conversations
      responses:
        '200': { description: Recent items }
  /api/search:
    get:
      summary: Keyword search over indexed conversations and messages
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: conversation_id
          in: query
          schema: { type: string }
        - name: project_id
          in: query
          schema: { type: string }
        - name: document_type
          in: query
          schema: { type: string, enum: [conversation, message, heading] }
      responses:
        '200': { description: Search results }
  /api/search/reindex:
    post:
      summary: Rebuild search documents and headings
      responses:
        '200': { description: Reindex result }
